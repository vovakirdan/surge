name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  guard:
    name: Ensure main branch
    runs-on: ubuntu-latest
    steps:
      - name: Check ref
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Release workflow must run on main." >&2
            exit 1
          fi

  ci:
    name: CI
    needs: guard
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    needs: [guard, ci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update CHANGELOG.md
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          previous_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
            range="$previous_tag..HEAD"
          else
            range="HEAD"
          fi
          ./scripts/update_changelog.sh "$version" "$range"
          if ! git diff --quiet -- CHANGELOG.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "docs(changelog): update for v${version#v}"
            git push origin HEAD:main
          fi
      - name: Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@v4.6.0
        with:
          config: cliff.toml
          args: --unreleased --tag v${{ inputs.version }} --strip header
        env:
          OUTPUT: RELEASE_CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build and package release assets
        run: |
          set -euo pipefail
          LDFLAGS=$(./scripts/ldflags.sh --base-version "${{ inputs.version }}")
          mkdir -p build
          for target in \
            linux/amd64/surge-linux-x86_64 \
            darwin/amd64/surge-darwin-x86_64 \
            darwin/arm64/surge-darwin-arm64
          do
            goos="${target%%/*}"
            rest="${target#*/}"
            goarch="${rest%%/*}"
            name="${rest#*/}"
            asset="$name.tar.gz"
            pkg="build/package-$goos-$goarch"

            mkdir -p "build/$name"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -ldflags "$LDFLAGS" -o "build/$name/surge" ./cmd/surge
            rm -rf "$pkg"
            mkdir -p "$pkg/bin" "$pkg/share/surge"
            cp "build/$name/surge" "$pkg/bin/surge"
            cp -R core "$pkg/share/surge/core"
            cp -R stdlib "$pkg/share/surge/stdlib"
            cp README.md README.ru.md CHANGELOG.md "$pkg/"
            tar -C "$pkg" -czf "build/$asset" .
          done
          (cd build && sha256sum surge-*.tar.gz > SHA256SUMS)
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ inputs.version }}"
          gh release create "$tag" build/surge-*.tar.gz build/SHA256SUMS --title "surge ${{ inputs.version }}" --notes-file "${{ steps.git-cliff.outputs.changelog }}"
