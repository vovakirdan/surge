name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  guard:
    name: Ensure main branch
    runs-on: ubuntu-latest
    steps:
      - name: Check ref
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Release workflow must run on main." >&2
            exit 1
          fi

  ci:
    name: CI
    needs: guard
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    needs: [guard, ci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4.6.0
        with:
          config: cliff.toml
          args: --unreleased --tag v${{ inputs.version }} --strip header
        env:
          OUTPUT: RELEASE_CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build surge (linux/amd64)
        run: |
          set -euo pipefail
          LDFLAGS=$(./scripts/ldflags.sh --base-version "${{ inputs.version }}")
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/surge ./cmd/surge
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ inputs.version }}"
          gh release create "$tag" build/surge --title "surge ${{ inputs.version }}" --notes-file "${{ steps.git-cliff.outputs.changelog }}"
